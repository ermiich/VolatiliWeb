services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - web-api
    networks:
      - volatiliweb-net

  web-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - evidence-data:/evidence
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - volatiliweb-net
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - evidence-data:/evidence:ro
      - symbols-data:/symbols
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - volatiliweb-net
    command: celery -A app.celery_app worker --loglevel=info --pool=solo

  redis:
    image: redis:7.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - volatiliweb-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - volatiliweb-net

volumes:
  postgres-data:
  evidence-data:
  symbols-data:

networks:
  volatiliweb-net:
    driver: bridge
